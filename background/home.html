<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>智慧听力</title>
    <link rel="stylesheet" href="../../../renderer/remixicon-local.css" />
    <style>
      :root { --bg:#0f1115; --fg:#e6e6e6; --muted:#a8b3c5; --panel:#12161c; --border:#1f232b; --accent:#1f6feb; }
      html, body { height: 100%; margin: 0; background: var(--bg); color: var(--fg); font-family: system-ui, Segoe UI, PingFang SC, Microsoft YaHei, sans-serif; }
      .wrap { display: grid; grid-template-rows: 40px 1fr; height: 100%; }
      .header { display:flex; gap:8px; align-items:center; padding:6px 10px; border-bottom:1px solid var(--border); }
      .header .path { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color: var(--muted); }
      .header .btn { height:28px; padding:0 10px; border:1px solid var(--border); border-radius:6px; background: var(--panel); color: var(--fg); }
      .main { display:grid; grid-template-columns: 320px 1fr; gap:0; height: calc(100% - 0px); }
      .left { border-right:1px solid var(--border); padding:10px; display:flex; flex-direction:column; }
      .left .head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
      .left .list { flex:1; overflow:auto; border:1px solid var(--border); border-radius:10px; background: var(--panel); }
      .left .item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-bottom:1px solid #1a1d24; }
      .left .item .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .left .item .ops button { background:#30363d; color:#e6e6e6; border:0; border-radius:4px; padding:2px 6px; margin-left:6px; }
      .left .hint { color: var(--muted); font-size: 12px; padding-top: 6px; }
      .right { padding:10px; display:flex; flex-direction:column; gap:10px; }
      .rtabs { display:flex; gap:8px; align-items:center; }
      .rtabs .tab { display:flex; align-items:center; gap:6px; padding:6px 10px; border:1px solid var(--border); border-radius: 8px; background: var(--panel); cursor:pointer; }
      .rtabs .tab.active { border-color: var(--accent); }
      .files { flex:1; min-width: 360px; max-width: 100%; height: 100%; overflow: auto; border:1px solid var(--border); border-radius:10px; background: var(--panel); }
      .files .file { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-bottom:1px solid #1a1d24; cursor:pointer; }
      .files .file .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
      .files .file .tag { font-size: 12px; color: var(--muted); }
      .player { flex:1; border:1px solid var(--border); border-radius:10px; background: var(--panel); padding:10px; display:flex; flex-direction:column; }
      .player .row { display:flex; align-items:center; gap:8px; }
      .player .title { font-weight:600; }
      .player .progress { display:flex; align-items:center; gap:8px; margin-top:8px; }
      .player input[type=range] { width:100%; }
      
      /* 自定义滚动条 */
      .files::-webkit-scrollbar, .left .list::-webkit-scrollbar { width: 10px; height: 10px; }
      .files::-webkit-scrollbar-thumb, .left .list::-webkit-scrollbar-thumb { background: #2a2f39; border-radius: 10px; }
      .files::-webkit-scrollbar-track, .left .list::-webkit-scrollbar-track { background: #15181e; border-radius: 10px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <button id="btn-up" class="btn"><i class="ri-arrow-up-line"></i> 返回上级</button>
        <span id="cur-path" class="path"></span>
      </div>
      <div class="main">
        <div class="left">
          <div class="head"><span>听力清单</span><span id="today-count" class="hint"></span></div>
          <div id="today" class="list"></div>
          <div class="hint">可拖动条目或使用上下按钮调整顺序；完成后自动移除并在文件列表中标记为已听完。</div>
        </div>
        <div class="right">
          <div class="files" id="files"></div>
          <audio id="audio" preload="metadata" style="display:none;"></audio>
        </div>
      </div>
      
    </div>
    <script>
      const api = () => {
        if (window.lowbarAPI) return window.lowbarAPI;
        console.error('Lowbar API not found');
        return { pluginCall: async () => ({ ok: false, error: 'API_MISSING' }), emitEvent: () => {}, onEvent: () => {} };
      };
      let gState = { dirs: [], files: {}, today: [], rate: 1.0, playing: false, currentIndex: -1 };
      let gActiveDir = '';
      const $ = (sel) => document.querySelector(sel);
      const todayEl = $('#today'); const filesEl = $('#files'); const curPathEl = $('#cur-path');
      const audio = $('#audio');

      async function loadEntries() {
        filesEl.innerHTML = '<div style="padding:10px;color:#888;">正在加载...</div>';
        if (!gActiveDir) {
            filesEl.innerHTML = `<div style="padding:10px;color:#d55;">未找到桌面路径<br><small>${window._lastError || ''}</small></div>`;
            return;
        }
        curPathEl.textContent = gActiveDir;
        try {
          let r = await api().pluginCall('smart-listening','listEntries',[gActiveDir]);
          if (r && r.ok && r.result && typeof r.result === 'object') {
             r = r.result;
          }
          if (!r || !r.ok) {
             filesEl.innerHTML = `<div style="padding:10px;color:#d55;">加载失败: ${r?.error || '未知错误'}</div>`;
             return;
          }
          const list = r.entries || [];
          if (list.length === 0) {
             filesEl.innerHTML = '<div style="padding:10px;color:#888;">文件夹为空</div>';
             return;
          }
          filesEl.innerHTML = '';
          for (const it of list) {
            const row = document.createElement('div'); row.className = 'file';
            const name = document.createElement('span'); name.className = 'name'; name.textContent = it.name;
            const tag = document.createElement('span'); tag.className = 'tag';
            if (it.type === 'dir') { tag.textContent = '文件夹'; }
            else { tag.textContent = it.listened ? '已听完' : (it.selected ? '已选择' : (it.isAudio ? '' : '非音频')); }
            row.appendChild(name); row.appendChild(tag);
            if (it.type === 'dir') {
              row.addEventListener('click', () => { gActiveDir = it.path; loadEntries(); });
            } else if (it.isAudio) {
              row.addEventListener('click', async () => { try { await api().pluginCall('smart-listening','addToToday',[it.path]); await loadToday(); await loadEntries(); } catch (e) {} });
            }
            filesEl.appendChild(row);
          }
        } catch (e) {
            filesEl.innerHTML = `<div style="padding:10px;color:#d55;">错误: ${e.message}</div>`;
        }
      }
      async function loadToday() {
        try { 
            let r = await api().pluginCall('smart-listening','getState',[]); 
            if (r && r.ok && r.result && typeof r.result === 'object') {
                r = r.result;
            }
            const s = r && r.ok ? r : { dirs:[], files:{}, today:[], rate:1.0, playing:false, currentIndex:-1 };
          gState = { ...gState, dirs: s.dirs || [], files: s.files || {}, today: s.today || [], rate: s.rate || 1.0, playing: !!s.playing, currentIndex: s.currentIndex ?? -1 };
          $('#today-count').textContent = '共 ' + (gState.today.length || 0) + ' 项';
        } catch (e) {}
        todayEl.innerHTML = '';
        gState.today.forEach((fp, idx) => {
          const row = document.createElement('div'); row.className = 'item'; row.draggable = true; row.dataset.index = String(idx);
          const name = document.createElement('span'); name.className = 'name'; name.textContent = fp.split('\\').pop();
          const ops = document.createElement('div'); ops.className = 'ops';
          const up = document.createElement('button'); up.textContent = '上移';
          const down = document.createElement('button'); down.textContent = '下移';
          up.addEventListener('click', () => moveItem(idx, Math.max(0, idx-1)));
          down.addEventListener('click', () => moveItem(idx, Math.min(gState.today.length-1, idx+1)));
          ops.appendChild(up); ops.appendChild(down);
          row.appendChild(name); row.appendChild(ops);
          row.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', String(idx)); });
          row.addEventListener('dragover', (e) => { e.preventDefault(); });
          row.addEventListener('drop', (e) => { const from = parseInt(e.dataTransfer.getData('text/plain'),10); const to = idx; moveItem(from, to); });
          todayEl.appendChild(row);
        });
      }
      async function moveItem(from, to) {
        if (Number.isNaN(from) || Number.isNaN(to)) return;
        const arr = gState.today.slice();
        const [it] = arr.splice(from, 1);
        arr.splice(to, 0, it);
        try { await api().pluginCall('smart-listening','reorderToday',[arr]); await loadToday(); } catch (e) {}
      }

      function bindAudio() {
        audio.addEventListener('timeupdate', () => {
          try { api().emitEvent('smart-listening-lowbar', { type:'player-progress', cur: Math.floor(audio.currentTime), dur: Math.floor(audio.duration||0) }); } catch (e) {}
        });
        audio.addEventListener('ended', () => {
          try { api().emitEvent('smart-listening-lowbar', { type:'player-ended', filePath: audio.dataset.path || '' }); } catch (e) {}
        });
      }

      function onEvent(name, data) {
        if (name !== 'smart-listening-lowbar' || !data) return;
        if (data.type === 'control' && data.action === 'player') {
          if (data.cmd === 'play') {
            const fp = String(data.filePath || '').trim(); if (!fp) return;
            audio.src = 'file:///' + fp.replace(/\\/g,'/'); audio.dataset.path = fp; audio.playbackRate = Number(data.rate || gState.rate || 1.0);
            audio.load(); audio.play();
          } else if (data.cmd === 'pause') {
            audio.pause();
          } else if (data.cmd === 'resume') {
            audio.play();
          } else if (data.cmd === 'rate') {
            const r = Number(data.rate || 1.0); audio.playbackRate = r;
          }
        }
      }

      async function init() {
        bindAudio();
        try { 
            const r = await api().pluginCall('smart-listening','getDesktopPath',[]); 
            console.log('getDesktopPath:', r);
            // Handle both flat structure and wrapped {ok:true, result:{...}} structure
            let result = r;
            if (r && r.ok && r.result && typeof r.result === 'object') {
                result = r.result;
            }
            
            if (result && result.ok && result.path) {
                gActiveDir = result.path;
            } else {
                gActiveDir = '';
                const errMsg = result ? (result.error || JSON.stringify(result)) : 'null response';
                window._lastError = errMsg;
                console.warn('Desktop path not found:', errMsg);
            }
        } catch (e) {
            console.error('getDesktopPath failed', e);
            window._lastError = e.message;
        }
        await loadToday();
        await loadEntries();
        api().onEvent(onEvent);
        document.getElementById('btn-up').addEventListener('click', () => {
          if (!gActiveDir) return;
          const parts = gActiveDir.split('\\');
          if (parts.length > 1) { parts.pop(); const p = parts.join('\\'); if (p) { gActiveDir = p; loadEntries(); } }
        });
      }
      // Wait for API injection if needed (though it should be ready)
      if (window.lowbarAPI) init();
      else window.addEventListener('DOMContentLoaded', init);
    </script>
  </body>
  </html>
