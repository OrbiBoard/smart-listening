<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>听力设置</title>
    <link rel="stylesheet" href="../../../renderer/remixicon-local.css" />
    <style>
      :root {
        --bg: #121621;
        --fg: #ededed;
        --muted: #94a3b8;
        --accent: #238f4a;
        --accent-rgb: 35, 143, 74;
        --panel: rgba(255, 255, 255, 0.04);
        --item-bg: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.12);
        --bg-modal: #1b1f2a;
        --scrollbar-bg: rgba(255, 255, 255, 0.05);
        --scrollbar-thumb: rgba(255, 255, 255, 0.2);
        --success: #22c55e;
        --warning: #f59e0b;
        --error: #ef4444;
      }
      
      html, body { height: 100%; overflow: hidden; }
      
      body { 
        margin: 0; padding: 0; 
        color: var(--fg); 
        background: var(--bg-modal); 
        transition: background 0.3s, color 0.3s; 
        font-family: "Microsoft YaHei", system-ui, sans-serif; 
        box-sizing: border-box;
      }
      
      .scroll-container {
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px;
      }
      
      .scroll-container::-webkit-scrollbar {
        width: 8px;
      }
      .scroll-container::-webkit-scrollbar-track {
        background: var(--scrollbar-bg);
        border-radius: 4px;
      }
      .scroll-container::-webkit-scrollbar-thumb {
        background: var(--scrollbar-thumb);
        border-radius: 4px;
      }
      .scroll-container::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.3);
      }
      
      .title { 
        font-size: 18px; 
        font-weight: 600; 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        margin-bottom: 16px;
      }
      
      .title i { color: var(--accent); }
      
      .card { 
        margin-bottom: 12px; 
        padding: 14px; 
        border-radius: 12px; 
        background: var(--panel); 
        border: 1px solid var(--border); 
      }
      
      .card-title { 
        font-size: 14px; 
        font-weight: 600; 
        color: var(--accent); 
        margin-bottom: 12px; 
        display: flex; 
        align-items: center; 
        gap: 6px; 
      }
      
      .card-title i { font-size: 16px; }
      
      .row { 
        display: flex; 
        align-items: center; 
        justify-content: space-between; 
        gap: 12px; 
        padding: 8px 0; 
      }
      
      .row label { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
        cursor: pointer; 
        font-size: 13px;
      }
      
      .row .hint { 
        color: var(--muted); 
        font-size: 11px; 
        margin-top: 2px;
      }
      
      .row-label {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      
      .btns { 
        display: flex; 
        gap: 8px; 
        margin-top: 16px; 
        flex-wrap: wrap; 
      }
      
      button { 
        padding: 8px 14px; 
        border-radius: 8px; 
        border: 1px solid var(--border); 
        background: var(--item-bg); 
        color: var(--fg); 
        transition: all .15s ease; 
        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        gap: 6px; 
        font-size: 13px;
      }
      
      button.primary { 
        background: var(--accent); 
        border-color: transparent; 
        color: #fff; 
      }
      
      button.danger { 
        background: rgba(220, 38, 38, 0.15); 
        color: #ef4444; 
        border-color: rgba(220, 38, 38, 0.25); 
      }
      
      button.danger:hover { 
        background: rgba(220, 38, 38, 0.25); 
      }
      
      button:hover { 
        filter: brightness(1.08); 
        transform: translateY(-1px); 
      }
      
      button:active { 
        filter: brightness(0.95); 
        transform: translateY(0); 
      }
      
      button:focus-visible { 
        outline: 2px solid var(--accent); 
        outline-offset: 2px; 
      }
      
      .field { 
        display: flex; 
        align-items: center; 
        gap: 8px; 
      }
      
      .field input[type="number"],
      .field input[type="text"] { 
        width: 80px; 
        padding: 6px 10px; 
        border-radius: 8px; 
        border: 1px solid var(--border); 
        background: var(--item-bg); 
        color: var(--fg); 
        outline: none; 
        font-size: 13px; 
      }
      
      .field input:focus { 
        border-color: var(--accent); 
      }
      
      .muted { color: var(--muted); }
      
      .divider { 
        height: 1px; 
        background: var(--border); 
        margin: 12px 0; 
      }
      
      .toggle-switch { 
        position: relative; 
        width: 44px; 
        height: 24px; 
      }
      
      .toggle-switch input { 
        opacity: 0; 
        width: 0; 
        height: 0; 
      }
      
      .toggle-slider { 
        position: absolute; 
        cursor: pointer; 
        inset: 0; 
        background-color: var(--border); 
        transition: .3s; 
        border-radius: 24px; 
      }
      
      .toggle-slider:before { 
        position: absolute; 
        content: ""; 
        height: 18px; 
        width: 18px; 
        left: 3px; 
        bottom: 3px; 
        background-color: var(--fg); 
        transition: .3s; 
        border-radius: 50%; 
      }
      
      .toggle-switch input:checked + .toggle-slider { 
        background-color: var(--accent); 
      }
      
      .toggle-switch input:checked + .toggle-slider:before { 
        transform: translateX(20px); 
      }
      
      .info-badge { 
        display: inline-flex; 
        align-items: center; 
        gap: 4px; 
        padding: 2px 8px; 
        border-radius: 12px; 
        background: rgba(var(--accent-rgb), 0.15); 
        color: var(--accent); 
        font-size: 11px; 
        font-weight: 600; 
      }
      
      .range-row { 
        flex-direction: column; 
        align-items: flex-start; 
        gap: 6px; 
      }
      
      .range-row .range-header { 
        display: flex; 
        justify-content: space-between; 
        width: 100%; 
        align-items: center; 
      }
      
      .range-row input[type="range"] { 
        width: 100%; 
        height: 6px; 
        border-radius: 3px; 
        background: var(--border); 
        outline: none; 
        -webkit-appearance: none; 
      }
      
      .range-row input[type="range"]::-webkit-slider-thumb { 
        -webkit-appearance: none; 
        width: 16px; 
        height: 16px; 
        border-radius: 50%; 
        background: var(--accent); 
        cursor: pointer; 
      }
      
      textarea {
        width: 100%;
        height: 100px;
        background: var(--item-bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        font-family: inherit;
        resize: vertical;
        outline: none;
      }
      
      textarea:focus {
        border-color: var(--accent);
      }
      
      textarea::placeholder {
        color: var(--muted);
      }
      
      .time-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
      }
      
      .time-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 4px 10px;
        border-radius: 6px;
        background: rgba(var(--accent-rgb), 0.15);
        color: var(--accent);
        font-size: 12px;
        font-weight: 500;
      }
      
      .time-chip .remove {
        cursor: pointer;
        opacity: 0.7;
        transition: opacity 0.15s;
      }
      
      .time-chip .remove:hover {
        opacity: 1;
      }
      
      .add-time-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
      }
      
      .add-time-row input[type="time"] {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--item-bg);
        color: var(--fg);
        outline: none;
        font-size: 13px;
      }
      
      .add-time-row input[type="time"]:focus {
        border-color: var(--accent);
      }
      
      .select-group {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      
      .select-option {
        padding: 6px 12px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--item-bg);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        font-size: 12px;
      }
      
      .select-option:hover {
        border-color: var(--accent);
        color: var(--fg);
      }
      
      .select-option.active {
        background: rgba(var(--accent-rgb), 0.15);
        border-color: var(--accent);
        color: var(--accent);
      }
      
      .bg-icon { 
        position: fixed; 
        right: 12px; 
        bottom: 8px; 
        font-size: 72px; 
        color: var(--fg); 
        opacity: 0.05; 
        pointer-events: none; 
      }
      
      .status-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 8px;
        background: var(--item-bg);
        margin-top: 8px;
      }
      
      .status-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: rgba(var(--accent-rgb), 0.15);
        color: var(--accent);
      }
      
      .status-info {
        flex: 1;
      }
      
      .status-title {
        font-size: 13px;
        font-weight: 500;
      }
      
      .status-desc {
        font-size: 11px;
        color: var(--muted);
        margin-top: 2px;
      }
    </style>
  </head>
  <body>
    <div class="scroll-container">
      <div class="title"><i class="ri-settings-3-line"></i> 听力设置</div>
      
      <div class="card">
        <div class="card-title"><i class="ri-play-circle-line"></i> 播放设置</div>
        
        <div class="row">
          <div class="row-label">
            <label>默认播放速度</label>
            <div class="hint">新添加音频的默认播放速度</div>
          </div>
          <div class="select-group" id="speed-group">
            <div class="select-option" data-speed="0.5">0.5x</div>
            <div class="select-option" data-speed="0.75">0.75x</div>
            <div class="select-option active" data-speed="1.0">1.0x</div>
            <div class="select-option" data-speed="1.25">1.25x</div>
            <div class="select-option" data-speed="1.5">1.5x</div>
            <div class="select-option" data-speed="2.0">2.0x</div>
          </div>
        </div>
        
        <div class="divider"></div>
        
        <div class="row">
          <div class="row-label">
            <label>自动播放下一首</label>
            <div class="hint">当前音频播放完毕后自动播放下一首</div>
          </div>
          <label class="toggle-switch">
            <input id="chk-auto-next" type="checkbox" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
        
        <div class="divider"></div>
        
        <div class="row">
          <div class="row-label">
            <label>播放完成后标记为已听</label>
            <div class="hint">音频播放完毕后自动标记为已听完</div>
          </div>
          <label class="toggle-switch">
            <input id="chk-auto-mark" type="checkbox" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title"><i class="ri-time-line"></i> 定时播放 <span class="info-badge">自动提醒</span></div>
        
        <div class="row">
          <div class="row-label">
            <label>启用定时播放</label>
            <div class="hint">到达设定时间自动开始播放</div>
          </div>
          <label class="toggle-switch">
            <input id="chk-schedule" type="checkbox" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        
        <div class="divider"></div>
        
        <div class="row" style="flex-direction: column; align-items: flex-start;">
          <label style="margin-bottom: 8px;">播放时间点</label>
          <div class="hint" style="margin-bottom: 8px;">添加多个时间点，到达时间将自动播放列表中的音频</div>
          <div class="time-list" id="time-list"></div>
          <div class="add-time-row">
            <input type="time" id="new-time" />
            <button id="btn-add-time"><i class="ri-add-line"></i> 添加</button>
          </div>
        </div>
        
        <div class="divider"></div>
        
        <div class="row">
          <div class="row-label">
            <label>播放前提醒</label>
            <div class="hint">定时播放前播放提示音</div>
          </div>
          <label class="toggle-switch">
            <input id="chk-notify" type="checkbox" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title"><i class="ri-folder-line"></i> 目录管理</div>
        
        <div class="status-row">
          <div class="status-icon"><i class="ri-folder-2-line"></i></div>
          <div class="status-info">
            <div class="status-title">默认音频目录</div>
            <div class="status-desc" id="default-dir">桌面目录</div>
          </div>
        </div>
        
        <div class="divider"></div>
        
        <div class="row">
          <div class="row-label">
            <label>支持的音频格式</label>
            <div class="hint">MP3, WAV, M4A, FLAC, OGG</div>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title"><i class="ri-history-line"></i> 数据管理</div>
        
        <div class="row">
          <div class="row-label">
            <label>清除播放列表</label>
            <div class="hint">清空当前播放列表中的所有音频</div>
          </div>
          <button id="btn-clear-list" class="danger"><i class="ri-delete-bin-line"></i> 清空</button>
        </div>
        
        <div class="divider"></div>
        
        <div class="row">
          <div class="row-label">
            <label>重置已听状态</label>
            <div class="hint">将所有音频标记为未听状态</div>
          </div>
          <button id="btn-reset-listened" class="danger"><i class="ri-restart-line"></i> 重置</button>
        </div>
      </div>
      
      <div class="btns">
        <button id="btn-save" class="primary"><i class="ri-save-3-line"></i> 保存设置</button>
        <button id="btn-close"><i class="ri-close-line"></i> 关闭</button>
      </div>
      
      <div class="muted" style="margin-top: 12px; font-size: 11px;">
        提示：设置会自动保存，下次打开时恢复
      </div>
      
      <div class="bg-icon"><i class="ri-headphone-line"></i></div>
    </div>
    
    <script>
      let channel = '';
      let caller = '';
      let scheduleTimes = [];
      let settings = {
        defaultSpeed: 1.0,
        autoNext: true,
        autoMark: true,
        scheduleEnabled: false,
        notifyBeforePlay: true
      };
      
      window.applyTheme = (mode, color) => {
        const root = document.documentElement;
        const isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        
        const accent = color || '#238f4a';
        root.style.setProperty('--accent', accent);
        
        const hex = accent.replace('#', '');
        const r = parseInt(hex.substring(0, 2), 16);
        const g = parseInt(hex.substring(2, 4), 16);
        const b = parseInt(hex.substring(4, 6), 16);
        root.style.setProperty('--accent-rgb', `${r}, ${g}, ${b}`);
        
        if (isDark) {
          root.style.setProperty('--bg', '#121621');
          root.style.setProperty('--fg', '#ededed');
          root.style.setProperty('--muted', '#94a3b8');
          root.style.setProperty('--panel', 'rgba(255, 255, 255, 0.04)');
          root.style.setProperty('--item-bg', 'rgba(255, 255, 255, 0.04)');
          root.style.setProperty('--border', 'rgba(255, 255, 255, 0.12)');
          root.style.setProperty('--bg-modal', '#1b1f2a');
          root.style.setProperty('--scrollbar-bg', 'rgba(255, 255, 255, 0.05)');
          root.style.setProperty('--scrollbar-thumb', 'rgba(255, 255, 255, 0.2)');
        } else {
          root.style.setProperty('--bg', '#f3f4f6');
          root.style.setProperty('--fg', '#1f2937');
          root.style.setProperty('--muted', '#6b7280');
          root.style.setProperty('--panel', '#ffffff');
          root.style.setProperty('--item-bg', '#f9fafb');
          root.style.setProperty('--border', '#e5e7eb');
          root.style.setProperty('--bg-modal', '#ffffff');
          root.style.setProperty('--scrollbar-bg', 'rgba(0, 0, 0, 0.05)');
          root.style.setProperty('--scrollbar-thumb', 'rgba(0, 0, 0, 0.2)');
        }
      };

      (async () => {
        try {
          if (window.lowbarAPI?.configGet) {
            const mode = await window.lowbarAPI.configGet('system', 'themeMode') || 'system';
            const color = await window.lowbarAPI.configGet('system', 'themeColor') || '#238f4a';
            window.applyTheme(mode, color);
          }
          
          if (window.lowbarAPI?.onConfigChanged) {
            window.lowbarAPI.onConfigChanged(async ({ scope, key, value }) => {
              if (scope === 'system') {
                const m = await window.lowbarAPI.configGet('system', 'themeMode') || 'system';
                const c = await window.lowbarAPI.configGet('system', 'themeColor') || '#238f4a';
                window.applyTheme(m, c);
              }
            });
          }

          if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', async () => {
              const m = await window.lowbarAPI?.configGet('system', 'themeMode') || 'system';
              if (m === 'system') {
                const c = await window.lowbarAPI?.configGet('system', 'themeColor') || '#238f4a';
                window.applyTheme('system', c);
              }
            });
          }
        } catch(e) {}
      })();

      function readInit() {
        try {
          const u = new URL(window.location.href);
          channel = String(u.searchParams.get('channel') || '');
          caller = String(u.searchParams.get('caller') || '');
        } catch (e) {}
      }
      
      function renderTimeList() {
        const list = document.getElementById('time-list');
        if (scheduleTimes.length === 0) {
          list.innerHTML = '<div class="muted" style="font-size: 12px;">暂无定时</div>';
          return;
        }
        
        list.innerHTML = scheduleTimes.map((time, idx) => `
          <div class="time-chip">
            <i class="ri-time-line"></i>
            <span>${time}</span>
            <span class="remove" data-idx="${idx}"><i class="ri-close-line"></i></span>
          </div>
        `).join('');
        
        list.querySelectorAll('.remove').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = parseInt(btn.dataset.idx, 10);
            if (!isNaN(idx)) {
              scheduleTimes.splice(idx, 1);
              renderTimeList();
            }
          });
        });
      }
      
      function addTime() {
        const input = document.getElementById('new-time');
        const time = input.value;
        if (time && /^\d{2}:\d{2}$/.test(time)) {
          if (!scheduleTimes.includes(time)) {
            scheduleTimes.push(time);
            scheduleTimes.sort();
            renderTimeList();
          }
          input.value = '';
        }
      }
      
      function setupSpeedSelector() {
        const group = document.getElementById('speed-group');
        group.querySelectorAll('.select-option').forEach(opt => {
          opt.addEventListener('click', () => {
            group.querySelectorAll('.select-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            settings.defaultSpeed = parseFloat(opt.dataset.speed) || 1.0;
          });
        });
      }
      
      function setSpeedValue(speed) {
        const group = document.getElementById('speed-group');
        group.querySelectorAll('.select-option').forEach(opt => {
          if (parseFloat(opt.dataset.speed) === speed) {
            opt.classList.add('active');
          } else {
            opt.classList.remove('active');
          }
        });
        settings.defaultSpeed = speed;
      }
      
      async function loadSettings() {
        try {
          const r = await window.lowbarAPI?.pluginCall?.('smart-listening', 'listScheduleTimes', []);
          const result = r && r.result ? r.result : r;
          if (result && result.times) {
            scheduleTimes = result.times.slice();
            renderTimeList();
          }
          
          const stateR = await window.lowbarAPI?.pluginCall?.('smart-listening', 'getState', []);
          const state = stateR && stateR.result ? stateR.result : stateR;
          if (state && state.rate) {
            setSpeedValue(state.rate);
          }
        } catch (e) {}
      }
      
      async function save() {
        settings.autoNext = document.getElementById('chk-auto-next').checked;
        settings.autoMark = document.getElementById('chk-auto-mark').checked;
        settings.scheduleEnabled = document.getElementById('chk-schedule').checked;
        settings.notifyBeforePlay = document.getElementById('chk-notify').checked;
        
        try {
          if (scheduleTimes.length > 0) {
            await window.lowbarAPI?.pluginCall?.('smart-listening', 'setScheduleTimes', [scheduleTimes]);
          } else {
            await window.lowbarAPI?.pluginCall?.('smart-listening', 'clearSchedule', []);
          }
          
          await window.lowbarAPI?.pluginCall?.('smart-listening', 'setRate', [settings.defaultSpeed]);
          
          const payload = {
            type: 'float.settings',
            settings: settings
          };
          
          if (caller && window.lowbarAPI?.pluginCall) {
            await window.lowbarAPI.pluginCall(caller, 'onLowbarEvent', [payload]);
          } else {
            await window.lowbarAPI?.emitEvent?.(channel, payload);
          }
          
          showToast('设置已保存');
        } catch (e) {
          showToast('保存失败');
        }
      }
      
      async function clearPlaylist() {
        if (!confirm('确定要清空播放列表吗？')) return;
        try {
          await window.lowbarAPI?.pluginCall?.('smart-listening', 'reorderToday', [[]]);
          showToast('播放列表已清空');
        } catch (e) {}
      }
      
      async function resetListened() {
        if (!confirm('确定要重置所有已听状态吗？')) return;
        try {
          await window.lowbarAPI?.pluginCall?.('smart-listening', 'resetAllListened', []);
          showToast('已听状态已重置');
        } catch (e) {}
      }
      
      function showToast(msg) {
        const existing = document.querySelector('.toast-msg');
        if (existing) existing.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.style.cssText = `
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          padding: 10px 20px;
          background: var(--bg-modal);
          border: 1px solid var(--border);
          border-radius: 8px;
          font-size: 13px;
          z-index: 1000;
          animation: fadeIn 0.3s ease;
        `;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
      }
      
      function closeSettings() {
        try {
          window.lowbarAPI?.emitEvent?.('smart-listening-lowbar', { 
            type: 'update', 
            target: 'floatingUrl', 
            value: null 
          });
        } catch (e) {}
      }
      
      document.getElementById('btn-add-time').addEventListener('click', addTime);
      document.getElementById('new-time').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTime();
      });
      
      document.getElementById('btn-save').addEventListener('click', save);
      document.getElementById('btn-close').addEventListener('click', closeSettings);
      document.getElementById('btn-clear-list').addEventListener('click', clearPlaylist);
      document.getElementById('btn-reset-listened').addEventListener('click', resetListened);
      
      readInit();
      setupSpeedSelector();
      loadSettings();
      renderTimeList();
    </script>
  </body>
</html>
